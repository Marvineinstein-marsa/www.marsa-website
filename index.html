/* ── SUPABASE HELPERS ── */
async function sbSignUp(email,password,name){
  const {data,error}=await db.auth.signUp({email,password,options:{data:{name}}});
  if(error)throw error;
  if(data.user){
    await db.from('profiles').upsert({id:data.user.id,name,email,is_admin:email===ADMIN_EMAIL});
  }
  return data;
}
async function sbSignIn(email,password){
  const {data,error}=await db.auth.signInWithPassword({email,password});
  if(error)throw error;
  return data;
}
async function sbSignOut(){await db.auth.signOut();}
async function sbGetProfile(userId){
  const {data}=await db.from('profiles').select('*').eq('id',userId).single();
  return data;
}
async function sbGetProducts(){
  const {data,error}=await db.from('products').select('*').order('created_at',{ascending:false});
  if(error)throw error;
  return data||[];
}
async function sbAddProduct(p){
  const {data,error}=await db.from('products').insert([p]).select().single();
  if(error)throw error;
  return data;
}
async function sbUpdateProduct(id,updates){
  const {data,error}=await db.from('products').update(updates).eq('id',id).select().single();
  if(error)throw error;
  return data;
}
async function sbDeleteProduct(id){
  const {error}=await db.from('products').delete().eq('id',id);
  if(error)throw error;
}
async function sbCreateOrder(order){
  const {data,error}=await db.from('orders').insert([order]).select().single();
  if(error)throw error;
  return data;
}
async function sbGetOrders(){
  const {data,error}=await db.from('orders').select('*').order('created_at',{ascending:false});
  if(error)throw error;
  return data||[];
}
async function sbUpdateOrderStatus(id,status){
  const {error}=await db.from('orders').update({status}).eq('id',id);
  if(error)throw error;
}
async function sbGetUserOrders(userId){
  const {data,error}=await db.from('orders').select('*').eq('user_id',userId).order('created_at',{ascending:false});
  if(error)throw error;
  return data||[];
}
async function sbUploadImage(file,name){
  const ext=file.name.split('.').pop();
  const path=`products/${name.replace(/\s/g,'-')}-${Date.now()}.${ext}`;
  const {error}=await db.storage.from('product-images').upload(path,file);
  if(error)throw error;
  const {data}=db.storage.from('product-images').getPublicUrl(path);
  return data.publicUrl;
}
async function sbGetReviews(productId){
  const {data}=await db.from('reviews').select('*').eq('product_id',productId).order('created_at',{ascending:false});
  return data||[];
}
async function sbAddReview(review){

}

/* ── CART REDUCER ── */
const cartR=(s,a)=>{
  if(a.t==='ADD'){const e=s.find(i=>i.id===a.item.id);return e?s.map(i=>i.id===a.item.id?{...i,qty:i.qty+(a.qty||1)}:i):[...s,{...a.item,qty:a.qty||1}];}
  if(a.t==='REMOVE')return s.filter(i=>i.id!==a.id);
  if(a.t==='QTY')return s.map(i=>i.id===a.id?{...i,qty:Math.max(1,a.qty)}:i);
  if(a.t==='CLEAR')return[];
  return s;
};
